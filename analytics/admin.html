<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Аналитика — Согласовано?</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f1117; color: #e0e0e0; font-family: sans-serif; padding: 24px; }
    h1 { color: #4CAF50; margin-bottom: 20px; font-size: 24px; }
    .controls { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    input, button {
      padding: 10px 16px; border-radius: 8px; border: 1px solid #333;
      background: #1e2130; color: #fff; font-size: 15px;
    }
    button { background: #4CAF50; border: none; cursor: pointer; font-weight: bold; }
    button:hover { background: #43a047; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #1e2130; color: #4CAF50; padding: 10px 8px; text-align: left; white-space: nowrap; }
    td { padding: 8px 8px; border-bottom: 1px solid #1e2130; }
    tr:hover td { background: #1a1f2e; }
    .medal-🥇 { color: #FFD700; } .medal-🥈 { color: #C0C0C0; } .medal-🥉 { color: #CD7F32; }
    #stats { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat { background: #1e2130; padding: 14px 20px; border-radius: 10px; }
    .stat .val { font-size: 28px; font-weight: bold; color: #4CAF50; }
    .stat .lbl { font-size: 12px; color: #888; }
    #status { margin-bottom: 12px; color: #888; }
    .tg-id { color: #58a6ff; font-size: 11px; }
    .nickname { font-weight: bold; color: #FFD700; }
  </style>
</head>
<body>
  <h1>📊 Аналитика — Согласовано?</h1>

  <div class="controls">
    <input id="apiUrl" placeholder="https://ВАШ_СЕРВИС.railway.app" style="width:320px">
    <input id="pass" type="password" placeholder="ADMIN_PASS">
    <button onclick="load()">Загрузить</button>
  </div>

  <div id="status">Введите URL сервиса и пароль, нажмите Загрузить</div>

  <div id="stats" style="display:none">
    <div class="stat"><div class="val" id="sTotal">0</div><div class="lbl">Всего игр</div></div>
    <div class="stat"><div class="val" id="sPlayers">0</div><div class="lbl">Уникальных игроков</div></div>
    <div class="stat"><div class="val" id="sBest">—</div><div class="lbl">Лучшее время</div></div>
    <div class="stat"><div class="val" id="sGold">0</div><div class="lbl">🥇 Золото</div></div>
  </div>

  <table id="table" style="display:none">
    <thead>
      <tr>
        <th>#</th>
        <th>Дата</th>
        <th>Telegram ID</th>
        <th>TG-имя</th>
        <th>Никнейм игрока</th>
        <th>Уровень</th>
        <th>Время</th>
        <th>Дист/Очки</th>
        <th>Медаль</th>
        <th>Итог</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <script>
    async function load() {
      const url  = document.getElementById('apiUrl').value.replace(/\/$/, '');
      const pass = document.getElementById('pass').value;
      document.getElementById('status').textContent = '⏳ Загружаю...';
      try {
        const r = await fetch(`${url}/scores?pass=${encodeURIComponent(pass)}`);
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const { rows } = await r.json();
        if (!rows || rows.length === 0) {
          document.getElementById('status').textContent = '📭 Данных пока нет';
          return;
        }
        // Пропускаем строку-заголовок если есть
        const data = rows[0]?.[0] === 'Дата' ? rows.slice(1) : rows;
        renderTable(data);
        document.getElementById('status').textContent = `✅ Загружено ${data.length} записей`;
      } catch(e) {
        document.getElementById('status').textContent = '❌ Ошибка: ' + e.message;
      }
    }

    function renderTable(rows) {
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';
      let bestTime = Infinity, gold = 0;
      const players = new Set();

      // Сортируем по дате убывания (новые сверху)
      const sorted = [...rows].reverse();

      sorted.forEach((r, i) => {
        // A=дата B=telegramId C=tgName D=nickname E=level F=time G=distance H=medal I=result
        const [date, telegramId, tgName, nickname, level, time, dist, medal, result] = r;
        players.add(telegramId);
        const t = parseFloat(time);
        if (t && t < bestTime) bestTime = t;
        if (medal === '🥇') gold++;

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${i+1}</td>
          <td style="color:#666;font-size:11px">${date || ''}</td>
          <td class="tg-id">${telegramId || '—'}</td>
          <td style="color:#aaa">${tgName || '—'}</td>
          <td class="nickname">${nickname || '—'}</td>
          <td>${level || '—'}</td>
          <td>${time ? time+'с' : '—'}</td>
          <td>${dist || '—'}</td>
          <td class="medal-${medal}">${medal || '—'}</td>
          <td style="color:#888;font-size:11px">${result || '—'}</td>
        `;
        tbody.appendChild(tr);
      });

      document.getElementById('sTotal').textContent   = rows.length;
      document.getElementById('sPlayers').textContent = players.size;
      document.getElementById('sBest').textContent    = bestTime === Infinity ? '—' : bestTime + 'с';
      document.getElementById('sGold').textContent    = gold;

      document.getElementById('stats').style.display = 'flex';
      document.getElementById('table').style.display  = 'table';
    }
  </script>
</body>
</html>

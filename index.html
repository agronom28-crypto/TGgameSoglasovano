<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Согласовано?</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <script async src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0d1117; overflow: hidden; font-family: sans-serif; }

    #splash {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: max(60px, env(safe-area-inset-bottom, 20px));
      background: #0d1117;
    }

    /* Пока картинка грузится — показываем скелетон */
    #coverImg {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
      z-index: 0;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    #coverImg.loaded { opacity: 1; }

    /* Скелетон-фон пока грузится */
    #splash::before {
      content: '';
      position: absolute; inset: 0; z-index: 0;
      background: linear-gradient(160deg, #1a2a4a 0%, #0d1117 50%, #1a1a2e 100%);
    }

    /* Спиннер загрузки */
    #loadingSpinner {
      position: absolute; top: 50%; left: 50%; z-index: 2;
      transform: translate(-50%, -50%);
      width: 48px; height: 48px;
      border: 4px solid rgba(255,140,0,0.2);
      border-top-color: #FF8C00;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
    #loadingSpinner.hidden { display: none; }

    @keyframes pulse {
      0%   { transform: scale(1);    box-shadow: 0 0 32px rgba(255,140,0,0.7), 0 4px 16px rgba(0,0,0,0.5); }
      50%  { transform: scale(1.08); box-shadow: 0 0 56px rgba(255,140,0,1),   0 8px 24px rgba(0,0,0,0.5); }
      100% { transform: scale(1);    box-shadow: 0 0 32px rgba(255,140,0,0.7), 0 4px 16px rgba(0,0,0,0.5); }
    }
    @keyframes glowRing {
      0%   { opacity: 0.6; transform: scale(1); }
      100% { opacity: 0;   transform: scale(1.7); }
    }

    #playBtn {
      position: relative; z-index: 1;
      padding: 18px 64px; font-size: 26px; font-weight: 900;
      letter-spacing: 4px; text-transform: uppercase; color: #fff;
      background: linear-gradient(135deg, #FF6B00, #FFB300);
      border: 3px solid rgba(255,255,255,0.5); border-radius: 50px;
      box-shadow: 0 0 32px rgba(255,140,0,0.7), 0 4px 16px rgba(0,0,0,0.5);
      cursor: pointer; animation: pulse 1.6s ease-in-out infinite;
      width: min(340px, 80vw);
      opacity: 0; transition: opacity 0.3s ease 0.2s;
    }
    #playBtn.visible { opacity: 1; }
    #playBtn::before {
      content: ''; position: absolute; inset: -6px; border-radius: 50px;
      border: 3px solid rgba(255,180,0,0.8);
      animation: glowRing 1.6s ease-out infinite; pointer-events: none;
    }
    #playBtn:active { transform: scale(0.95) !important; animation: none; }
  </style>
</head>
<body>
  <div id="splash">
    <div id="loadingSpinner"></div>
    <img id="coverImg" alt="Обложка" fetchpriority="high" decoding="async">
    <button id="playBtn" onclick="window.location.href='level-select.html'">&#9654; PLAY</button>
  </div>

  <script>
    if (window.Telegram?.WebApp) {
      Telegram.WebApp.expand();
      Telegram.WebApp.disableVerticalSwipes?.();
    }

    // Грузим Main.png только после того как страница распарсена
    const img = document.getElementById('coverImg');
    const spinner = document.getElementById('loadingSpinner');
    const btn = document.getElementById('playBtn');

    img.onload = function() {
      spinner.classList.add('hidden');
      img.classList.add('loaded');
      btn.classList.add('visible');
    };
    img.onerror = function() {
      spinner.classList.add('hidden');
      btn.classList.add('visible');
    };

    // Устанавливаем src только сейчас — браузер уже отрисовал страницу
    img.src = 'Main.png';
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Выбор уровня — Согласовано?</title>
  <link rel="stylesheet" href="level-select.css">
  <script async src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    #introOverlay {
      display: none; position: fixed; inset: 0; z-index: 999;
      background: #000; align-items: center; justify-content: center;
    }
    #introOverlay.show { display: flex; }
    #introVid {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
    }
    #introSkip {
      position: absolute; top: 18px; right: 18px; z-index: 10;
      background: rgba(0,0,0,0.55); color: #fff;
      border: 1px solid rgba(255,255,255,0.3); border-radius: 20px;
      padding: 8px 18px; font-size: 15px; cursor: pointer;
    }
    #introBack {
      position: absolute; top: 18px; left: 18px; z-index: 10;
      background: rgba(0,0,0,0.5); color: #fff;
      border: 1px solid rgba(255,255,255,0.3); border-radius: 20px;
      padding: 8px 16px; font-size: 14px; cursor: pointer;
    }
    #tapOverlay {
      display: none; position: absolute; inset: 0; z-index: 20;
      flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; gap: 14px;
    }
    #tapIcon {
      width: 80px; height: 80px; background: rgba(255,140,0,0.9);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 34px; color: #fff; box-shadow: 0 0 32px rgba(255,140,0,0.7);
      animation: tapPulse 1.4s ease-in-out infinite;
    }
    #tapLabel { color: #fff; font-size: 18px; font-weight: 700; text-shadow: 0 2px 8px rgba(0,0,0,0.8); }
    @keyframes tapPulse {
      0%,100% { transform: scale(1);    box-shadow: 0 0 24px rgba(255,140,0,0.6); }
      50%      { transform: scale(1.1); box-shadow: 0 0 44px rgba(255,140,0,0.9); }
    }

    /* Скелетон для незагруженных карточек */
    .card-bg {
      background: linear-gradient(135deg,#1a237e 0%,#0d1b3e 100%);
      transition: opacity 0.3s;
    }
    .card-bg.img-loading {
      background: linear-gradient(90deg, #1a2a4a 25%, #243450 50%, #1a2a4a 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>

  <div id="introOverlay">
    <video id="introVid" playsinline preload="none">
      <source id="introSrc" src="" type="video/mp4">
    </video>
    <div id="tapOverlay" onclick="resumeVideo()">
      <div id="tapIcon">&#9654;</div>
      <div id="tapLabel">Нажми чтобы начать</div>
    </div>
    <button id="introSkip">Пропустить &#9658;&#9658;</button>
    <button id="introBack" onclick="closeIntro()">&#8592; Уровни</button>
  </div>

  <div id="header">
    <div id="headerTitle">ВЫБЕРИ УРОВЕНЬ</div>
    <div id="headerSub">Согласовано?</div>
  </div>

  <div id="grid"></div>

  <script>
    if (window.Telegram?.WebApp) {
      Telegram.WebApp.expand();
      Telegram.WebApp.disableVerticalSwipes?.();
    }

    const LEVELS = [
      { n: 1,  title: 'Забег',         sub: '10 км до офиса',        img: 'Pictures/Main_level%201.png', path: 'level1/index.html', intro: 'Pictures/main_level1_video.mp4' },
      { n: 2,  title: 'Собеседование', sub: 'Пройди HR-фильтр',      img: 'Pictures/MainLevel2.png',     path: 'level2/index.html', intro: 'Pictures/main_level2_video.mp4' },
      { n: 3,  title: 'Деньги с неба', sub: 'Собери 100 согласиков', img: 'Pictures/Main_level3.png',    path: 'level3/index.html', intro: null },
      { n: 4,  title: 'Совещание',     sub: 'Скоро...',               img: null, path: null, intro: null },
      { n: 5,  title: 'Командировка',  sub: 'Скоро...',               img: null, path: null, intro: null },
      { n: 6,  title: 'Аудит',         sub: 'Скоро...',               img: null, path: null, intro: null },
      { n: 7,  title: 'Презентация',   sub: 'Скоро...',               img: null, path: null, intro: null },
      { n: 8,  title: 'Дедлайн',       sub: 'Скоро...',               img: null, path: null, intro: null },
      { n: 9,  title: 'Корпоратив',    sub: 'Скоро...',               img: null, path: null, intro: null },
      { n: 10, title: 'Финал',         sub: 'Скоро...',               img: null, path: null, intro: null },
    ];

    function isUnlocked(n) {
      if (n === 1) return true;
      if (n === 2) return !!localStorage.getItem('level1_done');
      if (n === 3) return !!localStorage.getItem('level2_done');
      return false;
    }

    let pendingPath = null;
    const overlay    = document.getElementById('introOverlay');
    const introVid   = document.getElementById('introVid');
    const introSrc   = document.getElementById('introSrc');
    const skipBtn    = document.getElementById('introSkip');
    const tapOverlay = document.getElementById('tapOverlay');

    skipBtn.onclick  = () => goToLevel();
    introVid.onended = () => goToLevel();

    function playIntro(src, path) {
      pendingPath = path;
      introSrc.src = src;
      introVid.load();
      overlay.classList.add('show');
      introVid.currentTime = 0;
      const p = introVid.play();
      if (p !== undefined) {
        p.then(() => { tapOverlay.style.display = 'none'; })
         .catch(() => { tapOverlay.style.display = 'flex'; });
      }
    }

    function resumeVideo() {
      tapOverlay.style.display = 'none';
      introVid.play().catch(() => goToLevel());
    }

    function goToLevel() {
      introVid.pause();
      overlay.classList.remove('show');
      if (pendingPath) window.location.href = pendingPath;
    }

    function closeIntro() {
      introVid.pause();
      overlay.classList.remove('show');
      tapOverlay.style.display = 'none';
      pendingPath = null;
    }

    function buildGrid() {
      const grid = document.getElementById('grid');

      // IntersectionObserver — грузим фото карточки только когда она видна
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (!entry.isIntersecting) return;
          const bg = entry.target;
          const src = bg.dataset.src;
          if (!src) return;
          observer.unobserve(bg);
          bg.classList.add('img-loading');
          const tmpImg = new Image();
          tmpImg.onload = () => {
            bg.style.backgroundImage = `url('${src}')`;
            bg.classList.remove('img-loading');
          };
          tmpImg.onerror = () => bg.classList.remove('img-loading');
          tmpImg.src = src;
        });
      }, { rootMargin: '100px' });

      LEVELS.forEach(lvl => {
        const unlocked = isUnlocked(lvl.n);
        const card = document.createElement('div');
        card.className = 'card' + (unlocked ? ' unlocked' : ' locked');

        const bg = document.createElement('div');
        bg.className = 'card-bg';
        if (lvl.img) {
          // Не ставим backgroundImage сразу — откладываем до появления в viewport
          bg.dataset.src = lvl.img;
          observer.observe(bg);
        }
        card.appendChild(bg);

        if (!unlocked) {
          const ov = document.createElement('div');
          ov.className = 'card-overlay';
          card.appendChild(ov);
          const lock = document.createElement('div');
          lock.className = 'lock-icon';
          lock.textContent = '\uD83D\uDD12';
          card.appendChild(lock);
        }

        const badge = document.createElement('div');
        badge.className = 'level-badge';
        badge.textContent = lvl.n;
        card.appendChild(badge);

        const info = document.createElement('div');
        info.className = 'card-info';
        info.innerHTML = `<div class="card-title">${lvl.title}</div><div class="card-sub">${lvl.sub}</div>`;
        card.appendChild(info);

        if (unlocked && lvl.path) {
          const btn = document.createElement('button');
          btn.className = 'play-btn';
          btn.textContent = 'ИГРАТЬ';
          btn.onclick = () => lvl.intro ? playIntro(lvl.intro, lvl.path) : (window.location.href = lvl.path);
          card.appendChild(btn);
        }

        grid.appendChild(card);
      });
    }

    buildGrid();

    const autoplayN = parseInt(new URLSearchParams(location.search).get('autoplay'));
    if (autoplayN) {
      const lvl = LEVELS.find(l => l.n === autoplayN);
      if (lvl && lvl.intro && lvl.path) {
        setTimeout(() => playIntro(lvl.intro, lvl.path), 100);
      } else if (lvl && lvl.path) {
        setTimeout(() => { window.location.href = lvl.path; }, 100);
      }
    }
  </script>
</body>
</html>

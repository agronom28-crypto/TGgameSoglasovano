<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Уровень 3 — Деньги с неба</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../leaderboard.css">
  <script src="../progress.js"></script>
  <script async src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div id="hud">
  <div id="hudLeft">
    <div id="hudScore">💰 <span id="scoreVal">0</span> / 100</div>
    <div id="hudTimer">⏱ <span id="timerVal">60</span>с</div>
  </div>
  <div id="hudRight">
    <div id="hudCaught">✅ <span id="caughtVal">0</span></div>
    <div id="hudMissed">💨 <span id="missedVal">0</span></div>
  </div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="startScreen">
  <div id="startCard">
    <div id="startEmoji">💸</div>
    <div id="startTitle">Деньги с неба!</div>
    <div id="startDesc">
      Собери <b>100 согласиков</b> за 60 секунд<br>
      Тапай по монетам — считай баланс<br>
      <span id="warnDyna">💣 Динамит — баланс обнуляется!</span>
    </div>
    <button id="startBtn" onclick="startGame()">НАЧАТЬ ▶</button>
  </div>
</div>

<div id="resultScreen">
  <div id="resultCard">
    <div id="resultEmoji"></div>
    <div id="resultTitle"></div>
    <div id="resultSub"></div>

    <!-- Рейтинг -->
    <div class="leaderboard-wrap">
      <h3>🏆 Топ-5 (скорость)</h3>
      <div id="lb3" class="lb-loading">Загрузка...</div>
    </div>

    <div class="btn-row">
      <button class="btn-retry" onclick="location.reload()">🔄 Ещё раз</button>
      <button class="btn-back" onclick="window.location.href='../level-select.html'">← Уровни</button>
    </div>
  </div>
</div>

<div id="booomOverlay">💥 БАЛАНС ОБНУЛЁН!</div>

<script>
const canvas  = document.getElementById('gameCanvas');
const ctx     = canvas.getContext('2d');

let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const GAME_DURATION   = 60;
const TARGET_SCORE    = 100;
const TOTAL_COINS     = 150;
const TOTAL_DYNAMITES = 5;
const COIN_RADIUS     = 26;
const DYNA_RADIUS     = 28;
const TAP_RADIUS      = 48;

let items = [], score = 0, caught = 0, missed = 0;
let timeLeft = GAME_DURATION, running = false, lastTime = 0;
let spawnedCoins = 0, spawnedDyna = 0;

const COIN_SPAWN_INTERVAL = GAME_DURATION * 1000 / TOTAL_COINS;
const DYNA_SPAWN_INTERVAL = GAME_DURATION * 1000 / TOTAL_DYNAMITES;

let nextCoinIn = 0, nextDynaIn = Math.random() * 8000 + 4000;

function spawnCoin() {
  if (spawnedCoins >= TOTAL_COINS) return;
  spawnedCoins++;
  const x = COIN_RADIUS + Math.random() * (W - COIN_RADIUS * 2);
  const speed = 120 + Math.random() * 140;
  const value = Math.random() < 0.15 ? 5 : (Math.random() < 0.35 ? 2 : 1);
  items.push({ type: 'coin', x, y: -COIN_RADIUS, speed, value, scale: 1, alpha: 1 });
}
function spawnDynamite() {
  if (spawnedDyna >= TOTAL_DYNAMITES) return;
  spawnedDyna++;
  const x = DYNA_RADIUS + Math.random() * (W - DYNA_RADIUS * 2);
  const speed = 90 + Math.random() * 80;
  items.push({ type: 'dyna', x, y: -DYNA_RADIUS, speed, scale: 1, alpha: 1, wobble: 0 });
}

function drawCoin(item) {
  ctx.save();
  ctx.globalAlpha = item.alpha;
  ctx.translate(item.x, item.y);
  ctx.scale(item.scale, item.scale);
  const r = COIN_RADIUS;
  ctx.beginPath(); ctx.ellipse(3, 4, r, r * 0.92, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#b8860b'; ctx.fill();
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2);
  const g = ctx.createRadialGradient(-r*.3,-r*.3,r*.1,0,0,r);
  g.addColorStop(0,'#ffe066'); g.addColorStop(.5,'#ffc800'); g.addColorStop(1,'#b8860b');
  ctx.fillStyle = g; ctx.fill();
  ctx.strokeStyle = '#c8960c'; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = '#7a5800'; ctx.font = `bold ${r*.9}px serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('₾', 1, 1);
  if (item.value > 1) {
    ctx.fillStyle = '#fff'; ctx.font = `bold ${r*.55}px sans-serif`;
    ctx.fillText('x'+item.value, r*.6, -r*.6);
  }
  ctx.restore();
}
function drawDynamite(item) {
  ctx.save(); ctx.globalAlpha = item.alpha;
  ctx.translate(item.x, item.y); ctx.rotate(Math.sin(item.wobble) * 0.18);
  ctx.scale(item.scale, item.scale);
  const r = DYNA_RADIUS;
  ctx.strokeStyle = '#888'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0,-r); ctx.bezierCurveTo(r*.8,-r*1.6,r*1.2,-r*.6,r*.4,-r*.15); ctx.stroke();
  ctx.beginPath(); ctx.arc(r*.4+Math.sin(item.wobble*3)*2,-r*.15,5,0,Math.PI*2);
  ctx.fillStyle='#ff6600'; ctx.fill();
  ctx.beginPath(); ctx.roundRect(-r*.6,-r*.1,r*1.2,r*1.8,8);
  const g2 = ctx.createLinearGradient(-r*.6,0,r*.6,0);
  g2.addColorStop(0,'#c0392b'); g2.addColorStop(.4,'#e74c3c'); g2.addColorStop(1,'#922b21');
  ctx.fillStyle = g2; ctx.fill();
  ctx.fillStyle='#fff'; ctx.font=`bold ${r*.55}px sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('💣',0,r*.8);
  ctx.restore();
}

let particles = [];
function burstCoins(x,y,color){
  for(let i=0;i<8;i++){
    const a=(Math.PI*2/8)*i;
    particles.push({x,y,vx:Math.cos(a)*(60+Math.random()*60),vy:Math.sin(a)*(60+Math.random()*60),alpha:1,color,life:.6,size:5});
  }
}
function burstExplosion(x,y){
  for(let i=0;i<16;i++){
    const a=Math.random()*Math.PI*2,sp=80+Math.random()*120;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,alpha:1,color:['#ff4500','#ff8c00','#ffd700','#fff'][Math.floor(Math.random()*4)],life:.8,size:4+Math.random()*6});
  }
}
function updateParticles(dt){
  particles=particles.filter(p=>p.alpha>0);
  particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=200*dt;p.life-=dt;p.alpha=Math.max(0,p.life);});
}
function drawParticlesList(){
  particles.forEach(p=>{ctx.save();ctx.globalAlpha=p.alpha;ctx.beginPath();ctx.arc(p.x,p.y,p.size||5,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();ctx.restore();});
}
function drawBackground(){
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#0d1b3e');sky.addColorStop(1,'#1a3a2a');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,0.6)';
  [[50,40],[120,90],[200,30],[300,70],[400,20],[500,55],[600,35],[700,80],[800,15],[150,150],[350,120],[550,100]].forEach(([sx,sy])=>{
    ctx.beginPath();ctx.arc(sx%W,sy,1.5,0,Math.PI*2);ctx.fill();
  });
}
function drawGround(){ctx.fillStyle='rgba(0,180,80,0.15)';ctx.fillRect(0,H-6,W,6);}
function drawProgressBar(){
  const barW=W-32,barH=10,barX=16,barY=H-28;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.roundRect(barX,barY,barW,barH,5);ctx.fill();
  const pct=Math.min(score/TARGET_SCORE,1);
  const fg=ctx.createLinearGradient(barX,0,barX+barW,0);
  fg.addColorStop(0,'#4caf50');fg.addColorStop(1,'#ffd700');
  ctx.fillStyle=fg;ctx.beginPath();ctx.roundRect(barX,barY,barW*pct,barH,5);ctx.fill();
}

let timerInterval=null,gameStartTime=0;

function startGame(){
  document.getElementById('startScreen').style.display='none';
  running=true;lastTime=performance.now();gameStartTime=performance.now();
  nextCoinIn=200;nextDynaIn=Math.random()*8000+5000;
  timerInterval=setInterval(()=>{
    if(!running)return;timeLeft--;
    document.getElementById('timerVal').textContent=timeLeft;
    if(timeLeft<=0)endGame(false);
  },1000);
  requestAnimationFrame(loop);
}
function loop(ts){
  if(!running)return;
  const dt=Math.min((ts-lastTime)/1000,.1);lastTime=ts;
  nextCoinIn-=dt*1000;nextDynaIn-=dt*1000;
  if(nextCoinIn<=0&&spawnedCoins<TOTAL_COINS){spawnCoin();nextCoinIn=COIN_SPAWN_INTERVAL*(.6+Math.random()*.8);}
  if(nextDynaIn<=0&&spawnedDyna<TOTAL_DYNAMITES){spawnDynamite();nextDynaIn=(GAME_DURATION*1000/TOTAL_DYNAMITES)*(.7+Math.random()*.6);}
  items.forEach(item=>{item.y+=item.speed*dt;if(item.type==='dyna')item.wobble+=dt*4;});
  items=items.filter(item=>{if(item.y>H+60){if(item.type==='coin'){missed++;document.getElementById('missedVal').textContent=missed;}return false;}return true;});
  updateParticles(dt);
  drawBackground();items.forEach(item=>item.type==='coin'?drawCoin(item):drawDynamite(item));drawParticlesList();drawGround();drawProgressBar();
  requestAnimationFrame(loop);
}
function handleTap(cx,cy){
  if(!running)return;
  let hit=null,minDist=Infinity;
  items.forEach(item=>{const dx=item.x-cx,dy=item.y-cy,dist=Math.sqrt(dx*dx+dy*dy);if(dist<TAP_RADIUS&&dist<minDist){minDist=dist;hit=item;}});
  if(!hit)return;
  items=items.filter(i=>i!==hit);
  if(hit.type==='coin'){
    score+=hit.value;caught++;
    document.getElementById('scoreVal').textContent=score;
    document.getElementById('caughtVal').textContent=caught;
    burstCoins(hit.x,hit.y,'#ffd700');
    if(score>=TARGET_SCORE){endGame(true);return;}
  }else{burstExplosion(hit.x,hit.y);score=0;document.getElementById('scoreVal').textContent=0;showBooom();}
}
canvas.addEventListener('touchstart',e=>{e.preventDefault();Array.from(e.changedTouches).forEach(t=>handleTap(t.clientX,t.clientY));},{passive:false});
canvas.addEventListener('mousedown',e=>handleTap(e.clientX,e.clientY));
let booomTimeout=null;
function showBooom(){const el=document.getElementById('booomOverlay');el.classList.add('show');clearTimeout(booomTimeout);booomTimeout=setTimeout(()=>el.classList.remove('show'),1200);}

function loadLeaderboard3() {
  Progress.fetchLeaderboard(3, function(list) {
    const container = document.getElementById('lb3');
    if (!list || list.length === 0) {
      container.innerHTML = '<div class="lb-empty">Пока никто не финишировал уровень</div>';
      return;
    }
    const medals = ['🥇','🥈','🥉','👍','👍'];
    const myNickname = localStorage.getItem('soglasovano_nickname');
    container.innerHTML = list.map(e => {
      const isMe = myNickname && e.name === myNickname;
      return `<div class="lb-row${isMe?' lb-me':''}">
        <span class="lb-rank">${medals[e.rank-1]||e.rank}</span>
        <span class="lb-name">${e.name}</span>
        <span class="lb-score">${e.time}с</span>
      </div>`;
    }).join('');
  });
}

function endGame(win) {
  if (!running) return;
  running = false;
  clearInterval(timerInterval);
  const elapsed = parseFloat(((performance.now()-gameStartTime)/1000).toFixed(1));
  const won     = win || score >= TARGET_SCORE;
  const medal   = won ? (elapsed<30?'🥇':(elapsed<45?'🥈':'🥉')) : '-';
  const result  = won ? 'finish' : 'timeout';
  if (window.Progress) {
    Progress.sendAnalytics(3,{time:elapsed,distance:score,medal,result});
  }
  document.getElementById('resultScreen').style.display='flex';
  if (won) {
    document.getElementById('resultEmoji').textContent='🏆';
    document.getElementById('resultTitle').textContent='СОГЛАСОВАНО!';
    document.getElementById('resultSub').textContent=`Собрано ${score} согласиков! Уровень пройден!`;
    if (window.Progress) Progress.completeLevel(3,{time:elapsed,medal,score});
  } else {
    document.getElementById('resultEmoji').textContent=score>=70?'😔':'💥';
    document.getElementById('resultTitle').textContent='Время вышло!';
    document.getElementById('resultSub').textContent=`Собрано: ${score} / 100 согласиков. Ещё раз!`;
  }
  // Загружаем рейтинг (сначала запись дойдет до сервера, немного подождём)
  setTimeout(loadLeaderboard3, 1200);
}
</script>
</body>
</html>

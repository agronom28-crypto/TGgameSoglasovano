<!DOCTYPE html>

<head>

  <title>Уровень 2 — Собеседование</title>

  <style>
    #bgVideo {
      position: fixed; inset: 0; z-index: 0;

      object-fit: cover;
      pointer-events: none;
    }
    #resultScreen, #quizScreen { position: relative; z-index: 1; }
  </style>
</head>
<body>

<video id="bgVideo" autoplay loop muted playsinline preload="auto">
  <source src="../Pictures/Level2_VideoFon_QUIZ.mp4" type="video/mp4">
</video>

<div id="resultScreen">
  <div id="resultCard">
    <div id="resultEmoji">🎉</div>
    <div id="resultTitle">Собеседование завершено!</div>
    <div id="resultScore"></div>
    <div id="resultComment"></div>
    <div class="btn-row">
      <button class="btn-retry" onclick="location.reload()">🔄 Ещё раз</button>
      <button class="btn-back" onclick="window.location.href='../level-select.html'">← Уровни</button>
    </div>
  </div>
</div>

<div id="quizScreen">
  <div id="quizHeader">
    <div id="hrAvatar">👔</div>
    <div id="hrName">HR Валентина Борисовна</div>
    <div id="quizProgress">Вопрос <span id="qNum">1</span> / 20</div>
  </div>

  <div id="progressBar"><div id="progressFill"></div></div>

  <div id="scoreBar">✅ <span id="scoreCount">0</span> правильных</div>

  <div id="questionBox">
    <div id="questionText"></div>
  </div>

  <div id="answersBox"></div>

  <div id="feedback"></div>

  <button id="nextBtn" onclick="nextQuestion()" style="display:none">Следующий вопрос →</button>
</div>

<script>
window.addEventListener('load', () => {
  const v = document.getElementById('bgVideo');
  v.play().catch(() => {
    document.addEventListener('touchstart', () => v.play(), { once: true });
    document.addEventListener('click',      () => v.play(), { once: true });
  });
});

    answers: ["Я командный игрок 🤝", "Предпочитаю работать один, люди раздражают 😤", "Я всегда лидер, остальные мешают 👑", "Какая команда? У меня был кот 🐱"],
    correct: 0,

  },
  {

    correct: 3,
    comment: "Психологический приём 'sunk cost'! Валентина Борисовна смеётся и подписывает оффер 📝"
  },
  {

    answers: ["Какие возможности роста? 📈", "Когда я могу уйти на обед? 🍽️", "Вы правда платите вовремя? 🤔", "Вы согласованы? 📋"],

let current = 0, score = 0, answered = false;

function showQuestion() {
  const q = QUESTIONS[current];
  document.getElementById('qNum').textContent = current + 1;
  document.getElementById('progressFill').style.width = ((current / 20) * 100) + '%';
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = '';
  document.getElementById('nextBtn').style.display = 'none';
  answered = false;
  const box = document.getElementById('answersBox');
  box.innerHTML = '';
  q.answers.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.textContent = ans;
    btn.onclick = () => selectAnswer(i, btn);
    box.appendChild(btn);
  });
}

function selectAnswer(idx, btn) {
  if (answered) return;
  answered = true;
  const q = QUESTIONS[current];
  document.querySelectorAll('.ans-btn').forEach((b, i) => {
    b.disabled = true;
    if (i === q.correct) b.classList.add('correct');
    else if (i === idx)  b.classList.add('wrong');
  });
  const fb = document.getElementById('feedback');
  if (idx === q.correct) {
    score++;
    document.getElementById('scoreCount').textContent = score;
    fb.textContent = '✅ ' + q.comment;
    fb.className = 'fb-correct';
  } else {
    fb.textContent = '❌ ' + q.comment;
    fb.className = 'fb-wrong';
  }
  document.getElementById('nextBtn').style.display = 'block';
}

function nextQuestion() {
  current++;
  if (current >= QUESTIONS.length) showResult();
  else showQuestion();
}

function showResult() {
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'flex';
  document.getElementById('resultScore').textContent = `Правильных ответов: ${score} из 20`;

  let emoji, title, comment, passed, medal;
  if (score >= 18)      { emoji='🏆'; title='ПРИНЯТ(А)!';             comment='Валентина Борисовна рыдает от счастья. Вы идеальный сотрудник!'; passed=true;  medal='🥇'; }
  else if (score >= 14) { emoji='😎'; title='Почти идеал!';           comment='Мы вам перезвоним. Честно. Наверное.'; passed=true;  medal='🥈'; }
  else if (score >= 10) { emoji='🤔'; title='Есть потенциал...';      comment='Приходите через полгода. Подучитесь.'; passed=false; medal='🥉'; }
  else if (score >= 5)  { emoji='😬'; title='Ну... спасибо за визит'; comment='Валентина Борисовна тихо плачет за кофемашиной.'; passed=false; medal='-';    }
  else                  { emoji='💀'; title='Это было... смело';       comment='Мы сохраним ваше резюме. В мусорной корзине. Но сохраним.'; passed=false; medal='-';    }

  document.getElementById('resultEmoji').textContent   = emoji;
  document.getElementById('resultTitle').textContent   = title;
  document.getElementById('resultComment').textContent = comment;

  // Аналитика — при ЛЮБОМ результате
  if (window.Progress) {
    Progress.sendAnalytics(2, {
      time:     0,
      distance: score,
      medal:    medal,
      result:   passed ? 'finish' : 'fail',
    });
  }

  // Прогресс — только при победе
  if (passed && window.Progress) {
    Progress.completeLevel(2, { time: 0, medal: medal, score: score });
  }
}

showQuestion();
</script>

</body>
</html>

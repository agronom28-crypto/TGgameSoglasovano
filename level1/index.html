<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Согласовано?</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preload" href="../Main.png" as="image">
  <script async src="https://telegram.org/js/telegram-web-app.js"></script>
  <script defer src="game.js"></script>
</head>
<body>

  <!-- ЗАСТАВКА -->
  <div id="splash">
    <img src="../Main.png" alt="Обложка" id="coverImg" fetchpriority="high">
    <button id="backBtn" onclick="history.back()">← Уровни</button>
    <button id="playBtn" onclick="startGame()">▶ PLAY</button>
  </div>

  <!-- ИГРА -->
  <div id="gameWrapper" style="display:none">
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
      <span id="timer">60</span>с &nbsp;
      <span id="distance">0</span> / 10 км
    </div>
  </div>

  <!-- ФИНИШНЫЙ РОЛИК -->
  <div id="finishScreen">
    <video id="finishVideo" playsinline preload="none">
      <source src="../Pictures/final_level1.mp4" type="video/mp4">
    </video>
    <button id="skipBtn" onclick="showFinishResult()">Пропустить ▶▶</button>

    <div id="finishResult">
      <div id="frEmoji">🏁</div>
      <div id="frTitle">Финиш!</div>
      <div class="stat-row">⏱ Время <span id="frTime">0с</span></div>
      <div class="stat-row">📏 Дистанция <span id="frScore">0 км</span></div>
      <div id="frMedal">🥇</div>
      <div id="frMedalLabel"></div>

      <!-- БАННЕР ПЕРЕХОДА НА УРОВЕНЬ 2 -->
      <div id="level2Banner">
        <div id="lvl2Badge">УРОВЕНЬ 2</div>
        <div id="lvl2Text">Ты в офисе. Впереди — собеседование!</div>
        <button id="lvl2Btn" onclick="goLevel2()">ИГРАТЬ →</button>
      </div>

      <div class="btn-row">
        <button class="btn-retry" onclick="location.reload()">🔄 Ещё раз</button>
        <button class="btn-share" onclick="shareResult()">
          <span class="btn-share-icon">📤</span>Поделиться
        </button>
      </div>
    </div>
  </div>

  <!-- ЭКРАН РЕЗУЛЬТАТА (проигрыш / таймаут) -->
  <div id="result">
    <div id="resultCard">
      <div id="resultEmoji">💥</div>
      <div id="resultTitle">Game Over</div>
      <div class="stat-row">ℹ️ Результат <span id="statScore">0 км</span></div>
      <div class="stat-row">⏱ Время <span id="statTime">0с</span></div>
      <div id="medal">😅</div>
      <div id="medalLabel"></div>
      <div class="btn-row">
        <button class="btn-retry" onclick="location.reload()">🔄 Ещё раз</button>
        <button class="btn-share" onclick="shareResult()">
          <span class="btn-share-icon">📤</span>Поделиться
        </button>
      </div>
    </div>
  </div>

  <script>
    function startGame() {
      document.getElementById('splash').style.display = 'none';
      document.getElementById('gameWrapper').style.display = 'block';
      initGame();
    }

    function goLevel2() {
      localStorage.setItem('level1_done', '1');
      window.location.href = '../level2/index.html';
    }

    function shareResult() {
      const score = document.getElementById('frScore')?.textContent
                 || document.getElementById('statScore').textContent;
      const time  = document.getElementById('frTime')?.textContent
                 || document.getElementById('statTime').textContent;
      const text  = `🏃 Сбежал в GreenBank! Пройдено: ${score} за ${time}. Сможешь быстрее? → @GreenBankBot`;
      if (window.Telegram?.WebApp?.switchInlineQuery) {
        Telegram.WebApp.switchInlineQuery(text, ['users', 'groups']);
      } else if (navigator.share) {
        navigator.share({ text });
      } else {
        navigator.clipboard?.writeText(text);
        alert('Текст скопирован!');
      }
    }
  </script>

  <style>
    #backBtn {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 2;
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
    }
    #backBtn:active { opacity: 0.7; }
  </style>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Уровень 1 — Согласовано?</title>
  <link rel="stylesheet" href="style.css">
  <script src="../progress.js"></script>
  <script async src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    #resultEmoji {
      display: block;
      width: 180px;
      height: 180px;
      margin: 0 auto 12px;
      border-radius: 16px;
    }
  </style>
</head>
<body>

  <!-- ИГРА -->
  <div id="gameWrapper">
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
      <span id="timer">60</span>с &nbsp;
      <span id="distance">0</span> / 10 км
    </div>
  </div>

  <!-- ФИНИШНЫЙ РОЛИК -->
  <div id="finishScreen">
    <video id="finishVideo" playsinline preload="auto">
      <source src="../Pictures/final_level1.mp4" type="video/mp4">
    </video>
    <button id="skipBtn" onclick="showFinishResult()">Пропустить ▶▶</button>

    <div id="finishResult">
      <div id="frEmoji">🏁</div>
      <div id="frTitle">Финиш!</div>
      <div class="stat-row">⏱ Время <span id="frTime">0с</span></div>
      <div class="stat-row">📏 Дистанция <span id="frScore">0 км</span></div>
      <div id="frMedal">🥇</div>
      <div id="frMedalLabel"></div>

      <div id="level2Banner">
        <div id="lvl2Badge">УРОВЕНЬ 2</div>
        <div id="lvl2Text">Ты в офисе. Впереди — собеседование!</div>
        <button id="lvl2Btn" onclick="goLevel2()">ИГРАТЬ →</button>
      </div>

      <div class="btn-row">
        <button class="btn-retry" onclick="location.reload()">🔄 Ещё раз</button>
        <button class="btn-share" onclick="shareResult()">
          <span class="btn-share-icon">📤</span>Поделиться
        </button>
      </div>
    </div>
  </div>

  <!-- ЭКРАН ПРОИГРЫША -->
  <div id="result">
    <div id="resultCard">
      <canvas id="resultEmoji"></canvas>
      <div id="resultTitle">Game Over</div>
      <div class="stat-row">ℹ️ Результат <span id="statScore">0 км</span></div>
      <div class="stat-row">⏱ Время <span id="statTime">0с</span></div>
      <div id="medal">😅</div>
      <div id="medalLabel"></div>
      <div class="btn-row">
        <button class="btn-retry" onclick="location.reload()">🔄 Ещё раз</button>
        <button class="btn-share" onclick="shareResult()">
          <span class="btn-share-icon">📤</span>Поделиться
        </button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
  <script>
    // Удаляем белый фон через Canvas
    (function() {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = function() {
        const canvas = document.getElementById('resultEmoji');
        canvas.width  = img.naturalWidth;
        canvas.height = img.naturalHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
          const r = data[i], g = data[i+1], b = data[i+2];
          if (r > 210 && g > 210 && b > 210) {
            const brightness = Math.min(r, g, b);
            data[i+3] = Math.round((255 - brightness) * 1.4);
          }
        }
        ctx.putImageData(imageData, 0, 0);
      };
      img.src = '../Pictures/Level1_SadGameOver.png';
    })();

    initGame();

    function goLevel2() {
      window.location.href = '../level-select.html?autoplay=2';
    }

    function shareResult() {
      const score = document.getElementById('frScore')?.textContent
                 || document.getElementById('statScore').textContent;
      const time  = document.getElementById('frTime')?.textContent
                 || document.getElementById('statTime').textContent;
      const text = `🏃 Сбежал в GreenBank! Пройдено: ${score} за ${time}. Сможешь быстрее? → @GreenBankBot`;
      if (window.Telegram?.WebApp?.switchInlineQuery) {
        Telegram.WebApp.switchInlineQuery(text, ['users', 'groups']);
      } else if (navigator.share) {
        navigator.share({ text });
      } else {
        navigator.clipboard?.writeText(text);
        alert('Текст скопирован!');
      }
    }
  </script>
</body>
</html>

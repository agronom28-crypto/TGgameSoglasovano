<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>До работы из дома</title>
  <link rel="stylesheet" href="style.css">
  <!-- Предзагрузка картинки заставки -->
  <link rel="preload" href="../Main.png" as="image">
  <!-- Telegram SDK загружается асинхронно, не блокирует страницу -->
  <script async src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- game.js читается параллельно с рендером DOM -->
  <script defer src="game.js"></script>
</head>
<body>

  <!-- ЗАСТАВКА -->
  <div id="splash">
    <img src="../Main.png" alt="Обложка" id="coverImg" fetchpriority="high">
    <button id="playBtn" onclick="startGame()">▶ PLAY</button>
  </div>

  <!-- ИГРА -->
  <div id="gameWrapper" style="display:none">
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
      <span id="timer">60</span>с &nbsp; 
      <span id="distance">0</span> / 10 км
    </div>
  </div>

  <!-- ЭКРАН РЕЗУЛЬТАТА -->
  <div id="result">
    <div id="resultCard">
      <div id="resultEmoji">🏁</div>
      <div id="resultTitle">Финиш!</div>
      <div class="stat-row">ℹ️ Результат <span id="statScore">0 км</span></div>
      <div class="stat-row">⏱ Время <span id="statTime">0с</span></div>
      <div id="medal">🥇</div>
      <div id="medalLabel">Золотая медаль</div>
      <div class="btn-row">
        <button class="btn-retry" onclick="location.reload()">🔄 Ещё раз</button>
        <button class="btn-share" onclick="shareResult()">
          <span class="btn-share-icon">📤</span>Поделиться
        </button>
      </div>
    </div>
  </div>

  <script>
    function startGame() {
      // Моментально скрываем заставку — игра появится мгновенно
      const splash = document.getElementById('splash');
      const wrapper = document.getElementById('gameWrapper');
      splash.style.display = 'none';
      wrapper.style.display = 'block';
      // initGame точно есть (загружен через defer)
      initGame();
    }

    function shareResult() {
      const score = document.getElementById('statScore').textContent;
      const time  = document.getElementById('statTime').textContent;
      const text  = `🏃 Сбежал в GreenBank! Пройдено: ${score} за ${time}. Сможешь быстрее? → @GreenBankBot`;
      if (window.Telegram?.WebApp?.switchInlineQuery) {
        Telegram.WebApp.switchInlineQuery(text, ['users', 'groups']);
      } else if (navigator.share) {
        navigator.share({ text });
      } else {
        navigator.clipboard?.writeText(text);
        alert('Текст скопирован в буфер!');
      }
    }
  </script>
</body>
</html>

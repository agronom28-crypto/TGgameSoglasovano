<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Уровень 1 — Согласовано?</title>
  <link rel="stylesheet" href="style.css">
  <script async src="https://telegram.org/js/telegram-web-app.js"></script>
  <script defer src="game.js"></script>
</head>
<body>

  <!-- ИНТРО-РОЛИК -->
  <div id="introScreen">
    <video id="introVideo" playsinline preload="auto" muted>
      <source src="../Pictures/main_level1_video.mp4" type="video/mp4">
    </video>

    <!-- Оверлей «нажми чтобы начать» — виден пока видео не запущено -->
    <div id="introTap" onclick="playIntro()">
      <div id="introTapIcon">▶</div>
      <div id="introTapLabel">Нажми чтобы начать</div>
    </div>

    <button id="introSkipBtn" onclick="startGame()">Пропустить ▶▶</button>
    <button id="backBtn" onclick="history.back()">← Уровни</button>
  </div>

  <!-- ИГРА -->
  <div id="gameWrapper" style="display:none">
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
      <span id="timer">60</span>с &nbsp;
      <span id="distance">0</span> / 10 км
    </div>
  </div>

  <!-- ФИНИШНЫЙ РОЛИК -->
  <div id="finishScreen">
    <video id="finishVideo" playsinline preload="none">
      <source src="../Pictures/final_level1.mp4" type="video/mp4">
    </video>
    <button id="skipBtn" onclick="showFinishResult()">Пропустить ▶▶</button>

    <div id="finishResult">
      <div id="frEmoji">🏁</div>
      <div id="frTitle">Финиш!</div>
      <div class="stat-row">⏱ Время <span id="frTime">0с</span></div>
      <div class="stat-row">📏 Дистанция <span id="frScore">0 км</span></div>
      <div id="frMedal">🥇</div>
      <div id="frMedalLabel"></div>

      <div id="level2Banner">
        <div id="lvl2Badge">УРОВЕНЬ 2</div>
        <div id="lvl2Text">Ты в офисе. Впереди — собеседование!</div>
        <button id="lvl2Btn" onclick="goLevel2()">ИГРАТЬ →</button>
      </div>

      <div class="btn-row">
        <button class="btn-retry" onclick="location.reload()">🔄 Ещё раз</button>
        <button class="btn-share" onclick="shareResult()">
          <span class="btn-share-icon">📤</span>Поделиться
        </button>
      </div>
    </div>
  </div>

  <!-- ЭКРАН РЕЗУЛЬТАТА (проигрыш / таймаут) -->
  <div id="result">
    <div id="resultCard">
      <div id="resultEmoji">💥</div>
      <div id="resultTitle">Game Over</div>
      <div class="stat-row">ℹ️ Результат <span id="statScore">0 км</span></div>
      <div class="stat-row">⏱ Время <span id="statTime">0с</span></div>
      <div id="medal">😅</div>
      <div id="medalLabel"></div>
      <div class="btn-row">
        <button class="btn-retry" onclick="location.reload()">🔄 Ещё раз</button>
        <button class="btn-share" onclick="shareResult()">
          <span class="btn-share-icon">📤</span>Поделиться
        </button>
      </div>
    </div>
  </div>

  <script>
    const introVideo = document.getElementById('introVideo');
    const introTap   = document.getElementById('introTap');

    // Попытка автоплей (muted — разрешён в большинстве браузеров)
    window.addEventListener('load', () => {
      introVideo.play()
        .then(() => {
          // Автоплей сработал — спрячем оверлей
          introTap.style.display = 'none';
        })
        .catch(() => {
          // Блокировка — показываем оверлей «нажми»
          introTap.style.display = 'flex';
        });
      introVideo.onended = () => startGame();
    });

    function playIntro() {
      introTap.style.display = 'none';
      introVideo.muted = false; // включаем звук после жеста
      introVideo.currentTime = 0;
      introVideo.play().catch(() => startGame());
    }

    function startGame() {
      document.getElementById('introScreen').style.display = 'none';
      introVideo.pause();
      document.getElementById('gameWrapper').style.display = 'block';
      if (typeof initGame === 'function') initGame();
    }

    function goLevel2() {
      localStorage.setItem('level1_done', '1');
      window.location.href = '../level2/index.html';
    }

    function shareResult() {
      const score = document.getElementById('frScore')?.textContent
                 || document.getElementById('statScore').textContent;
      const time  = document.getElementById('frTime')?.textContent
                 || document.getElementById('statTime').textContent;
      const text  = `🏃 Сбежал в GreenBank! Пройдено: ${score} за ${time}. Сможешь быстрее? → @GreenBankBot`;
      if (window.Telegram?.WebApp?.switchInlineQuery) {
        Telegram.WebApp.switchInlineQuery(text, ['users', 'groups']);
      } else if (navigator.share) {
        navigator.share({ text });
      } else {
        navigator.clipboard?.writeText(text);
        alert('Текст скопирован!');
      }
    }
  </script>

  <style>
    #introScreen {
      position: fixed; inset: 0; z-index: 150;
      background: #000;
      display: flex;
      align-items: center; justify-content: center;
    }
    #introVideo {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    /* Оверлей «нажми» */
    #introTap {
      display: none; /* показывается только если autoplay заблокирован */
      position: absolute; inset: 0; z-index: 11;
      flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer;
      background: rgba(0,0,0,0.45);
      gap: 16px;
    }
    #introTapIcon {
      width: 80px; height: 80px;
      background: rgba(255,140,0,0.9);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; color: #fff;
      box-shadow: 0 0 32px rgba(255,140,0,0.7);
      animation: tapPulse 1.4s ease-in-out infinite;
    }
    #introTapLabel {
      color: #fff; font-size: 18px; font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      letter-spacing: 1px;
    }
    @keyframes tapPulse {
      0%, 100% { transform: scale(1);    box-shadow: 0 0 24px rgba(255,140,0,0.6); }
      50%       { transform: scale(1.1); box-shadow: 0 0 44px rgba(255,140,0,0.9); }
    }
    #introSkipBtn {
      position: absolute; top: 18px; right: 18px; z-index: 12;
      background: rgba(0,0,0,0.55); color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px; padding: 8px 18px;
      font-size: 15px; cursor: pointer;
    }
    #introSkipBtn:active { opacity: 0.7; }
    #backBtn {
      position: absolute; top: 18px; left: 18px; z-index: 12;
      background: rgba(0,0,0,0.5); color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px; padding: 8px 16px;
      font-size: 14px; cursor: pointer;
    }
    #backBtn:active { opacity: 0.7; }
  </style>
</body>
</html>
